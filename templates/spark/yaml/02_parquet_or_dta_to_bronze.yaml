# ============================================================
# SPARK OPERATOR : Parquet ou DTA (staging) → Iceberg Bronze
# ============================================================
# Packages inclus : iceberg, hadoop-aws, nessie
# (pas spark-excel → image plus légère, démarrage plus rapide)
# Script : s3a://sparkapplication/parquet_to_bronze.py
#       ou s3a://sparkapplication/dta_to_bronze.py
#
# Appliquer : kubectl apply -f 02_parquet_or_dta_to_bronze.yaml -n airflow
# ============================================================

apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  # <<< À MODIFIER >>>
  name: parquet-to-bronze-ma-table
  namespace: airflow
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "apache/spark:v3.5.0"
  # <<< À MODIFIER : choisir le bon script >>>
  mainApplicationFile: "s3a://sparkapplication/parquet_to_bronze.py"
  sparkVersion: "3.5.0"

  # --- PACKAGES (sans spark-excel) ---
  deps:
    packages:
      - "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1"
      - "org.apache.hadoop:hadoop-aws:3.3.4"
      - "org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.77.1"
    # Pour le script dta_to_bronze.py, ajouter les dépendances Python :
    # pyFiles:
    #   - "s3a://sparkapplication/requirements_dta.txt"
    # (ou utiliser une image Docker custom avec pyreadstat pré-installé)

  # --- CONFIGURATION SPARK ---
  sparkConf:
    "spark.sql.extensions": >-
      org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,
      org.projectnessie.spark.extensions.NessieSparkSessionExtensions
    "spark.sql.catalog.nessie":              "org.apache.iceberg.spark.SparkCatalog"
    "spark.sql.catalog.nessie.catalog-impl": "org.apache.iceberg.nessie.NessieCatalog"
    "spark.sql.catalog.nessie.uri":          "http://nessie.trino.svc.cluster.local:19120/api/v1"
    "spark.sql.catalog.nessie.ref":          "main"
    "spark.sql.catalog.nessie.warehouse":    "s3a://bronze/"

  # --- CONFIGURATION MINIO ---
  hadoopConf:
    "fs.s3a.endpoint":                 "http://minio.mon-namespace.svc.cluster.local:80"
    "fs.s3a.path.style.access":        "true"
    "fs.s3a.impl":                     "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"

  driver:
    cores: 1
    memory: "8g"
    serviceAccount: spark-operator-spark
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: access-key
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: secret-key

  executor:
    cores: 2
    instances: 2
    memory: "4g"
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: access-key
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: secret-key
